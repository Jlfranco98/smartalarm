<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MiAlarma">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>MiAlarma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#e8192c; --red-dark:#c0121f; --red-light:#fff0f1;
  --green:#00b562; --green-light:#f0fdf6;
  --orange:#ff8c00; --orange-light:#fff8f0;
  --bg:#f5f5f7; --white:#ffffff; --text:#1a1a1a;
  --muted:#6e6e73; --border:#e5e5ea; --nav-h:72px;
  --safe-bot:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);overflow:hidden}

.screen{position:fixed;inset:0;background:var(--white);opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .28s cubic-bezier(.4,0,.2,1),transform .28s cubic-bezier(.4,0,.2,1);z-index:1}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);z-index:2}

#s-login{display:flex;flex-direction:column;background:var(--white)}
.login-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem 1.5rem}
.login-brand{font-size:32px;font-weight:900;color:var(--red);letter-spacing:-1px}
.login-tagline{font-size:13px;color:var(--muted);margin-top:2px}
.login-form{width:100%;max-width:340px}
.lf-group{margin-bottom:14px}
.lf-label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.lf-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:14px;font-size:15px;outline:none;background:var(--white)}
.lf-err{font-size:12px;color:var(--red);min-height:16px;margin-top:4px}
.btn-red{width:100%;padding:15px;background:var(--red);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:800;cursor:pointer}

#s-app{background:var(--bg);display:flex;flex-direction:column}
.topbar{background:var(--white);padding:calc(var(--safe-top) + 12px) 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);z-index:10}
.tb-brand{font-size:22px;font-weight:900;color:var(--red)}
.tb-address{font-size:11px;color:var(--muted);flex:1;text-align:center}
.tb-icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:none;display:flex;align-items:center;justify-content:center;font-size:18px}

.page-area{flex:1;position:relative;overflow:hidden}
.page{position:absolute;inset:0;overflow-y:auto;opacity:0;pointer-events:none;transform:translateY(6px);transition:opacity .22s,transform .22s;padding-bottom:calc(var(--nav-h) + var(--safe-bot) + 12px)}
.page.active{opacity:1;pointer-events:all;transform:translateY(0)}

.bottomnav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bot));background:var(--white);border-top:1px solid var(--border);display:flex;padding-top:8px;padding-bottom:var(--safe-bot);z-index:10}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none}
.nav-icon{font-size:22px}
.nav-label{font-size:10px;font-weight:700;color:var(--muted)}
.nav-item.active .nav-label{color:var(--red)}

.home-status-card{margin:16px 16px 0;background:var(--white);border-radius:20px;padding:28px 20px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.06)}
.hs-circle{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;transition:background .4s}
.hs-circle-armed{background:var(--red)}
.hs-circle-disarmed{background:var(--green)}
.hs-circle-home{background:var(--orange)}
.hs-status{font-size:20px;font-weight:900}
.hs-btn{padding:9px 18px;border-radius:20px;border:none;font-size:13px;font-weight:800;margin:5px}
.hs-btn-red{background:var(--red);color:#fff}
.hs-btn-green{background:var(--green);color:#fff}
.hs-btn-orange{background:var(--orange);color:#fff}

.hist-list{padding:0 16px}
.hist-item{display:flex;align-items:center;gap:12px;background:var(--white);border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.hi-dot{width:10px;height:10px;border-radius:50%}
.hi-armed{background:var(--red)}
.hi-disarmed{background:var(--green)}
.hi-info{flex:1}
.hi-action{font-size:14px;font-weight:800}
.hi-user{font-size:12px;color:var(--muted)}

.pin-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.pin-modal-bg.open{opacity:1;pointer-events:all}
.pin-modal{background:var(--white);border-radius:24px 24px 0 0;padding:24px;width:100%;transform:translateY(100%);transition:transform .3s}
.pin-modal-bg.open .pin-modal{transform:translateY(0)}
.pm-dots{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.pm-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border)}
.pm-dot.on{background:var(--red);border-color:var(--red)}
.pm-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto}
.pm-key{padding:16px;background:var(--bg);border-radius:14px;font-size:20px;font-weight:700;border:none}

.admin-card{background:var(--white);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.05)}
.form-field{margin-bottom:12px}
.form-field input, .form-field select{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:12px}
.btn-add{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:12px;font-weight:800}

#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:12px;padding:10px 22px;opacity:0;transition:opacity .2s;z-index:999}
#toast.show{opacity:1}
</style>
</head>
<body>

<div id="s-login" class="screen active">
  <div class="login-top">
    <div class="login-brand">MiAlarma</div>
    <div class="login-tagline">Seguridad Sincronizada</div>
    <div class="login-form">
      <div class="lf-group"><label class="lf-label">Usuario</label><input class="lf-input" id="li-user"></div>
      <div class="lf-group"><label class="lf-label">Contraseña</label><input class="lf-input" id="li-pass" type="password"></div>
      <div class="lf-err" id="li-err"></div>
      <button class="btn-red" onclick="doLogin()">Entrar</button>
    </div>
  </div>
</div>

<div id="s-app" class="screen">
  <div class="topbar">
    <div class="tb-brand">MiAlarma</div>
    <div class="tb-address" id="tb-addr">Cargando...</div>
    <div class="tb-icons">
      <button class="tb-icon-btn" onclick="syncWithDB()">🔄</button>
    </div>
  </div>

  <div class="page-area">
    <div class="page active" id="pg-inicio">
      <div class="home-status-card">
        <div class="hs-circle hs-circle-disarmed" id="hs-circle"><div style="font-size:38px" id="hs-icon">🔓</div></div>
        <div class="hs-status" id="hs-status">Desconectada</div>
        <div class="hs-actions">
          <button class="hs-btn hs-btn-red" onclick="openPin('arm_away')">Armar</button>
          <button class="hs-btn hs-btn-green" onclick="openPin('disarm')">Desarmar</button>
        </div>
      </div>
      <div style="padding:20px 16px 10px; font-weight:900">Historial Reciente</div>
      <div class="hist-list" id="home-log"></div>
    </div>

    <div class="page" id="pg-historial">
        <div style="padding:20px 16px 10px; font-weight:900">Historial Completo</div>
        <div class="hist-list" id="full-log"></div>
    </div>

    <div class="page" id="pg-admin">
      <div class="admin-card" style="margin:16px">
        <div style="font-weight:900; margin-bottom:10px">Nuevo Usuario</div>
        <div class="form-field"><input id="nu-name" placeholder="Nombre"></div>
        <div class="form-field"><input id="nu-user" placeholder="Login"></div>
        <div class="form-field"><input id="nu-pass" type="password" placeholder="Contraseña"></div>
        <div class="form-field"><input id="nu-pin" type="password" maxlength="4" placeholder="PIN 4 dígitos"></div>
        <button class="btn-add" onclick="addUser()">Guardar en la Nube</button>
      </div>
      <div class="admin-card" style="margin:16px">
        <div style="font-weight:900; margin-bottom:10px">Configuración Servidor</div>
        <div class="form-field"><input id="cfg-url" placeholder="https://...railway.app"></div>
        <button class="btn-add" style="background:#666" onclick="saveURL()">Guardar URL</button>
      </div>
    </div>
  </div>

  <div class="bottomnav">
    <button class="nav-item active" id="nav-inicio" onclick="navTo('inicio')"><div class="nav-icon">🏠</div><div class="nav-label">Inicio</div></button>
    <button class="nav-item" id="nav-historial" onclick="navTo('historial')"><div class="nav-icon">📋</div><div class="nav-label">Historial</div></button>
    <button class="nav-item" id="nav-admin" onclick="navTo('admin')"><div class="nav-icon">⚙️</div><div class="nav-label">Admin</div></button>
  </div>
</div>

<div class="pin-modal-bg" id="pin-modal-bg">
  <div class="pin-modal">
    <div style="text-align:center; font-weight:900; margin-bottom:20px">PIN de Seguridad</div>
    <div class="pm-dots" id="pm-dots"></div>
    <div class="pm-numpad" id="pm-numpad"></div>
    <button class="btn-add" style="background:#ccc; margin-top:15px" onclick="closePin()">Cerrar</button>
  </div>
</div>

<div id="toast"></div>

<script>
let S = { users: [], log: [], alarmStatus: 'disarmed', config: {url:''}, currentUser: null };
let pinBuffer = '', pinAction = '';

async function load(){
  const d = JSON.parse(localStorage.getItem('mialarm_cfg') || '{}');
  if(d.url) { 
    S.config.url = d.url; 
    document.getElementById('cfg-url').value = d.url;
    await syncWithDB(); 
  }
}

async function syncWithDB(){
  if(!S.config.url) return;
  try {
    const [resU, resL] = await Promise.all([
        fetch(S.config.url + '/api/usuarios'),
        fetch(S.config.url + '/api/historial')
    ]);
    S.users = await resU.json();
    S.log = await resL.json();
    renderLog();
    toast2("Sincronizado");
  } catch(e){ console.error("Error de red"); }
}

function doLogin(){
  const u = document.getElementById('li-user').value;
  const p = document.getElementById('li-pass').value;
  // Primero intentamos con el admin maestro por si no hay DB
  if(u === 'admin' && p === 'admin123'){ 
    S.currentUser = {name: 'Admin', pin: '0000'};
  } else {
    const user = S.users.find(x => x.username === u && x.password === p);
    if(!user){ document.getElementById('li-err').textContent="Fallo de login"; return; }
    S.currentUser = user;
  }
  document.getElementById('s-login').classList.remove('active');
  document.getElementById('s-app').classList.add('active');
  document.getElementById('tb-addr').textContent = "Hola, " + S.currentUser.name;
}

async function applyAction(action){
  try {
    await fetch(S.config.url + '/api/control', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action, user: S.currentUser.name })
    });
    S.alarmStatus = action === 'disarm' ? 'disarmed' : 'armed';
    updateUI();
    setTimeout(syncWithDB, 1000);
  } catch(e){ toast2("Error al enviar"); }
}

async function addUser(){
  const body = {
    name: document.getElementById('nu-name').value,
    username: document.getElementById('nu-user').value,
    password: document.getElementById('nu-pass').value,
    pin: document.getElementById('nu-pin').value
  };
  await fetch(S.config.url + '/api/usuarios', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  syncWithDB();
  toast2("Usuario Guardado");
}

function renderLog(){
  const html = S.log.map(l => `
    <div class="hist-item">
      <div class="hi-dot ${l.accion==='disarm'?'hi-disarmed':'hi-armed'}"></div>
      <div class="hi-info">
        <div class="hi-action">${l.accion === 'disarm' ? 'Desarmado' : 'Armado'}</div>
        <div class="hi-user">${l.usuario}</div>
      </div>
      <div style="font-size:10px; color:#999">${new Date(l.fecha).toLocaleTimeString()}</div>
    </div>`).join('');
  document.getElementById('home-log').innerHTML = html;
  document.getElementById('full-log').innerHTML = html;
}

function updateUI(){
  const c = document.getElementById('hs-circle');
  const i = document.getElementById('hs-icon');
  const s = document.getElementById('hs-status');
  c.className = S.alarmStatus === 'disarmed' ? 'hs-circle hs-circle-disarmed' : 'hs-circle hs-circle-armed';
  i.textContent = S.alarmStatus === 'disarmed' ? '🔓' : '🔒';
  s.textContent = S.alarmStatus === 'disarmed' ? 'Desconectada' : 'Conectada';
}

function openPin(a){ pinAction=a; pinBuffer=''; buildPinUI(); document.getElementById('pin-modal-bg').classList.add('open'); }
function closePin(){ document.getElementById('pin-modal-bg').classList.remove('open'); }
function buildPinUI(){
  const d = document.getElementById('pm-dots'); d.innerHTML = '';
  for(let i=0;i<4;i++) d.innerHTML += `<div class="pm-dot" id="dot${i}"></div>`;
  const n = document.getElementById('pm-numpad'); n.innerHTML = '';
  [1,2,3,4,5,6,7,8,9,0].forEach(v => {
    const b = document.createElement('button'); b.className='pm-key'; b.textContent=v;
    b.onclick = () => {
      if(pinBuffer.length < 4){
        pinBuffer += v;
        document.getElementById('dot'+(pinBuffer.length-1)).classList.add('on');
        if(pinBuffer.length === 4){
          if(pinBuffer === S.currentUser.pin){ applyAction(pinAction); closePin(); }
          else { pinBuffer = ''; buildPinUI(); }
        }
      }
    };
    n.appendChild(b);
  });
}

function saveURL(){
  const url = document.getElementById('cfg-url').value.trim().replace(/\/$/, "");
  localStorage.setItem('mialarm_cfg', JSON.stringify({url}));
  S.config.url = url;
  syncWithDB();
}

function navTo(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.getElementById('pg-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
}

function toast2(m){
  const t = document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

load();
</script>
</body>
</html>
