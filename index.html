<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Verisure</title>
<style>
/* AÑADIR ESTO A TU CSS: Pantalla de bloqueo para PIN obligatorio */
#s-force-pin {
  display:none; position:fixed; inset:0; background:var(--white); 
  z-index:9999; flex-direction:column; align-items:center; justify-content:center; padding:2rem;
}
.pin-setup-input {
  width:100%; max-width:260px; padding:15px; border:2px solid var(--border);
  border-radius:18px; text-align:center; font-size:32px; letter-spacing:0.5em; font-weight:900;
}
</style>
</head>
<body>

<div id="s-login" class="screen active">
  <div class="login-top">
    <div class="login-logo-wrap">
      <div class="login-brand">VERISURE</div>
      <div class="login-tagline">Control total de tu alarma</div>
    </div>
    <div class="login-form">
      <div class="lf-group">
        <label class="lf-label">Usuario</label>
        <input class="lf-input" id="li-user" type="text" placeholder="Tu usuario">
        <div class="lf-err" id="li-err"></div>
      </div>
      <div class="lf-group">
        <label class="lf-label">Contraseña</label>
        <input class="lf-input" id="li-pass" type="password" placeholder="••••••••">
      </div>
      <button class="btn-red" onclick="doLogin()">Iniciar sesión</button>
    </div>
  </div>
</div>

<div id="s-force-pin">
  <div style="text-align:center; margin-bottom:2rem">
    <div style="color:var(--orange); font-weight:900; font-size:20px">NUEVO PIN REQUERIDO</div>
    <p style="font-size:13px; color:var(--muted)">Por seguridad, debes configurar tu PIN personal.</p>
  </div>
  <input type="password" id="new-pin-setup" maxlength="4" class="pin-setup-input" placeholder="0000">
  <button class="btn-red" style="margin-top:2rem; max-width:260px" onclick="saveNewPin()">Guardar y Entrar</button>
</div>

<script>
let S = {
  users: [], 
  log: [],
  alarmStatus: 'disarmed',
  config: {backendUrl:''},
  currentUser: null
};

// ... (Tus funciones de carga y navegación se mantienen) ...

// 3. LOGIN MODIFICADO: Ahora valida contra tu MongoDB en Railway
async function doLogin(){
  const u = document.getElementById('li-user').value;
  const p = document.getElementById('li-pass').value;
  const err = document.getElementById('li-err');

  try {
    const res = await fetch(S.config.backendUrl + '/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ username: u, password: p })
    });
    
    const data = await res.json();

    if(!res.ok) {
      err.textContent = data.message || "Credenciales incorrectas";
      return;
    }

    S.currentUser = data.user;

    // A) VERIFICAR SI DEBE CAMBIAR EL PIN
    if(S.currentUser.mustChangePin) {
      document.getElementById('s-force-pin').style.display = 'flex';
      return;
    }

    // B) SI NO DEBE CAMBIARLO, ENTRAR
    finalizeLogin();

  } catch(e) {
    err.textContent = "Error de conexión con Railway";
  }
}

function finalizeLogin() {
  document.getElementById('s-login').classList.remove('active');
  document.getElementById('s-app').classList.add('active');
  document.getElementById('tb-addr').textContent = "Hola, " + S.currentUser.name;
  
  // CONTROL DE ROL: Si no es admin, ocultamos la pestaña de usuarios
  if(S.currentUser.role !== 'admin') {
    document.getElementById('nav-admin').style.display = 'none';
  } else {
    document.getElementById('nav-admin').style.display = 'flex';
  }
  
  renderLog();
}

// 4. NUEVA FUNCIÓN: Guardar el PIN en MongoDB
async function saveNewPin() {
  const nuevoPin = document.getElementById('new-pin-setup').value;
  if(nuevoPin.length !== 4) return toast2("El PIN debe ser de 4 cifras");

  try {
    const res = await fetch(S.config.backendUrl + '/api/usuarios/update-pin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ 
        userId: S.currentUser._id, 
        nuevoPin: nuevoPin 
      })
    });

    if(res.ok) {
      toast2("PIN actualizado con éxito");
      location.reload(); // Reiniciamos para que entre con los nuevos datos
    }
  } catch(e) {
    toast2("Error al conectar con el servidor");
  }
}

// 3. LOGIN: Ahora sí encontrará a los usuarios que creaste en la nube
function doLogin(){
  const u = document.getElementById('li-user').value;
  const p = document.getElementById('li-pass').value;
  
  // Buscamos en la lista S.users que acabamos de descargar de Railway
  const user = S.users.find(x => x.username === u && x.password === p);
  
  if(!user){ 
    document.getElementById('li-err').textContent = "Usuario o clave incorrectos"; 
    return; 
  }
  
  S.currentUser = user;
  document.getElementById('s-login').classList.remove('active');
  document.getElementById('s-app').classList.add('active');
  document.getElementById('tb-addr').textContent = "Hola, " + user.name;
  renderLog();
}

// --- El resto de tus funciones se mantienen igual para no romper nada ---

async function applyAction(action){
  try {
    await fetch(S.config.backendUrl + '/api/control', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action, user: S.currentUser.name })
    });
    S.alarmStatus = action === 'disarm' ? 'disarmed' : action === 'arm_away' ? 'armed' : 'arm_home';
    updateStatusUI();
    toast2("Comando enviado");
    setTimeout(syncWithDB, 1500);
  } catch(e) { toast2("Error de red"); }
}

async function addUser(){
  const newUser = {
    name: document.getElementById('nu-name').value,
    username: document.getElementById('nu-user').value,
    password: document.getElementById('nu-pass').value,
    pin: document.getElementById('nu-pin').value
  };
  try {
    await fetch(S.config.backendUrl + '/api/usuarios', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(newUser)
    });
    syncWithDB();
    toast2("Usuario creado en la nube");
  } catch(e) { toast2("Error al crear"); }
}

function renderLog(){
  if(!S.log) return;
  const html = S.log.map(l => `
    <div class="hist-item">
      <div class="hi-dot ${l.accion==='disarm'?'hi-disarmed':'hi-armed'}"></div>
      <div class="hi-info">
        <div class="hi-action">${l.accion === 'disarm' ? 'Desarmado' : 'Armado'}</div>
        <div class="hi-user">${l.usuario}</div>
      </div>
      <div style="font-size:11px; color:#999">${new Date(l.fecha).toLocaleTimeString()}</div>
    </div>`).join('');
  document.getElementById('home-log').innerHTML = html;
  document.getElementById('full-log').innerHTML = html;
}

function updateStatusUI(){
  const c = document.getElementById('hs-circle');
  const i = document.getElementById('hs-icon');
  const s = document.getElementById('hs-status');
  if(S.alarmStatus==='disarmed'){ c.className='hs-circle hs-circle-disarmed'; i.textContent='🔓'; s.textContent='Desconectada'; }
  else if(S.alarmStatus==='armed'){ c.className='hs-circle hs-circle-armed'; i.textContent='🔒'; s.textContent='Conectada'; }
  else { c.className='hs-circle hs-circle-home'; i.textContent='🏠'; s.textContent='En Casa'; }
}

function openPin(a){ pinAction=a; pinBuffer=''; buildPinDots(); buildNumpad(); document.getElementById('pin-modal-bg').classList.add('open'); }
function closePin(){ document.getElementById('pin-modal-bg').classList.remove('open'); }
function buildPinDots(){
  const d = document.getElementById('pm-dots'); d.innerHTML = '';
  for(let i=0;i<4;i++) d.innerHTML += `<div class="pm-dot" id="pd${i}"></div>`;
}
function buildNumpad(){
  const n = document.getElementById('pm-numpad'); n.innerHTML = '';
  [1,2,3,4,5,6,7,8,9,0].forEach(v => {
    const b = document.createElement('button'); b.className='pm-key'; b.textContent=v;
    b.onclick = () => {
      if(pinBuffer.length < 4){
        pinBuffer += v;
        document.getElementById('pd'+(pinBuffer.length-1)).classList.add('on');
        if(pinBuffer.length === 4){
          if(pinBuffer === S.currentUser.pin){ applyAction(pinAction); closePin(); }
          else { pinBuffer = ''; buildPinDots(); }
        }
      }
    };
    n.appendChild(b);
  });
}

function saveConfig(){
  let url = document.getElementById('cfg-backend').value.trim();
  if(url.endsWith('/')) url = url.slice(0,-1);
  S.config.backendUrl = url;
  localStorage.setItem('mialarm', JSON.stringify({config: S.config}));
  syncWithDB();
}

function navTo(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.getElementById('pg-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
}

function doLogout(){ location.reload(); }
function toast2(m){
  const t = document.getElementById('toast');
  if(t) { t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
}

load();
</script>
</body>
</html>
