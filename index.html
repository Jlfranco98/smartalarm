<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alarma">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Control Alarma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0f;
  --surface:  #13131a;
  --surface2: #1c1c26;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #f0f0f8;
  --muted:    #6b6b80;
  --armed:    #ff4444;
  --armed-bg: rgba(255,68,68,0.08);
  --home:     #ff9500;
  --home-bg:  rgba(255,149,0,0.08);
  --safe:     #34c759;
  --safe-bg:  rgba(52,199,89,0.08);
  --accent:   #7c6af7;
  --radius:   16px;
  --radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden}
.mono{font-family:'DM Mono',monospace}

/* ── Screens ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;transform:translateY(12px)}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0)}

/* ── Login ── */
#s-login{align-items:center;justify-content:center;padding:2rem;background:var(--bg)}
.login-logo{width:72px;height:72px;border-radius:22px;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;margin-bottom:2rem}
.login-logo svg{width:36px;height:36px}
.login-title{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:2.5rem}
.login-card{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.field-label{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.field-select,.field-input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;appearance:none;margin-bottom:1.2rem}
.field-select:focus,.field-input:focus{border-color:var(--accent)}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:1.2rem}
.pin-dot{width:12px;height:12px;border-radius:50%;background:transparent;border:2px solid var(--border2);transition:background .15s,border-color .15s}
.pin-dot.on{background:var(--text);border-color:var(--text)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.2rem}
.nk{padding:14px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--text);cursor:pointer;text-align:center;transition:background .1s,transform .1s;user-select:none}
.nk:active,.nk.pressed{background:var(--surface);transform:scale(0.94)}
.nk.del{font-size:16px}
.nk.empty{opacity:0;pointer-events:none}
.err{font-size:12px;color:var(--armed);text-align:center;min-height:16px;margin-bottom:.5rem}
.btn-primary{width:100%;padding:14px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s}
.btn-primary:active{opacity:.85;transform:scale(0.98)}

/* ── Main App ── */
#s-app{background:var(--bg)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top, 16px) 20px 12px;padding-top:max(env(safe-area-inset-top),16px)}
.topbar-title{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.topbar-user{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted)}
.logout-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-family:'Syne',sans-serif;font-size:11px;padding:5px 10px;cursor:pointer}

.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 120px;-webkit-overflow-scrolling:touch}

/* Status card */
.status-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 20px;margin-bottom:12px;text-align:center;position:relative;overflow:hidden;transition:border-color .4s,background .4s}
.status-card.armed{border-color:rgba(255,68,68,.3);background:linear-gradient(135deg,var(--surface),rgba(255,68,68,.04))}
.status-card.home{border-color:rgba(255,149,0,.3);background:linear-gradient(135deg,var(--surface),rgba(255,149,0,.04))}
.status-card.disarmed{border-color:rgba(52,199,89,.3);background:linear-gradient(135deg,var(--surface),rgba(52,199,89,.04))}
.status-pulse{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;position:relative}
.status-pulse::before{content:'';position:absolute;inset:-8px;border-radius:50%;opacity:.2;animation:pulse 2.5s infinite}
.armed .status-pulse{background:var(--armed-bg)}
.armed .status-pulse::before{background:var(--armed);animation:pulse 1.2s infinite}
.home .status-pulse{background:var(--home-bg)}
.home .status-pulse::before{background:var(--home);animation:pulse 2s infinite}
.disarmed .status-pulse{background:var(--safe-bg)}
.disarmed .status-pulse::before{background:var(--safe)}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.15}50%{transform:scale(1.35);opacity:.06}}
.status-icon{font-size:28px;line-height:1}
.status-label{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
.status-detail{font-size:12px;color:var(--muted)}
.status-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:8px}

/* Section */
.section-title{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin:20px 0 10px}

/* Action card */
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.action-card-title{font-size:13px;font-weight:700;margin-bottom:4px}
.action-card-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.pin-row{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.pin-row .pin-dot{width:11px;height:11px}
.mini-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.mini-numpad .nk{padding:11px 6px;font-size:16px}
.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.action-btn{padding:13px 8px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:opacity .1s,transform .1s,background .2s;background:var(--surface2);color:var(--text)}
.action-btn:active{transform:scale(0.96);opacity:.8}
.action-btn.arm{border-color:rgba(255,68,68,.3);color:var(--armed)}
.action-btn.arm:active{background:var(--armed-bg)}
.action-btn.home{border-color:rgba(255,149,0,.3);color:var(--home)}
.action-btn.home:active{background:var(--home-bg)}
.action-btn.disarm{grid-column:1/-1;border-color:rgba(52,199,89,.3);color:var(--safe)}
.action-btn.disarm:active{background:var(--safe-bg)}
.action-err{font-size:12px;color:var(--armed);text-align:center;min-height:14px;margin-bottom:8px}

/* Log */
.log-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.log-info{flex:1}
.log-action{font-size:13px;font-weight:600}
.log-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.log-time{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-align:right}

/* Admin tabs */
.tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;gap:4px;margin-bottom:12px}
.tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.04em;border-radius:7px;cursor:pointer;color:var(--muted);transition:background .15s,color .15s}
.tab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.tab-panel{display:none}.tab-panel.active{display:block}

/* User rows */
.user-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.user-row:last-child{border-bottom:none}
.user-av{width:38px;height:38px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0}
.user-name{font-size:14px;font-weight:700}
.user-role{font-size:11px;color:var(--muted)}
.del-btn{margin-left:auto;background:none;border:1px solid rgba(255,68,68,.3);color:var(--armed);font-family:'Syne',sans-serif;font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer}

/* Form */
.form-group{margin-bottom:14px}
.form-group .field-label{display:block;margin-bottom:5px}
.btn-secondary{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-secondary:active{opacity:.7}
.btn-danger{border-color:rgba(255,68,68,.4);color:var(--armed);background:var(--armed-bg)}
.success-msg{font-size:12px;color:var(--safe);text-align:center;min-height:14px}

/* Toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Bottom nav (admin) */
.bottomnav{display:none}

/* Refresh btn */
.refresh-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);padding:5px 8px;cursor:pointer;font-size:14px}

/* Connecting state */
.conn-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--safe)}
.conn-dot.off{background:var(--armed)}
.conn-dot.busy{background:var(--home);animation:blink .7s infinite alternate}
@keyframes blink{from{opacity:1}to{opacity:.3}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login" class="screen active">
  <div class="login-logo">
    <svg viewBox="0 0 36 36" fill="none">
      <rect x="8" y="16" width="20" height="14" rx="3" stroke="#7c6af7" stroke-width="1.8"/>
      <path d="M12 16v-4a6 6 0 0112 0v4" stroke="#7c6af7" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="18" cy="23" r="2" fill="#7c6af7"/>
    </svg>
  </div>
  <p class="login-title">Control Alarma</p>
  <p class="login-sub">Smart Life / Tuya</p>
  <div class="login-card">
    <p class="field-label">Usuario</p>
    <select class="field-select" id="login-user-sel"></select>
    <p class="field-label">PIN</p>
    <div class="pin-dots" id="login-dots"></div>
    <div class="numpad" id="login-numpad"></div>
    <p class="err" id="login-err"></p>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="s-app" class="screen" style="display:flex;flex-direction:column">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="app-title">Alarma</div>
      <div class="conn-badge"><span class="conn-dot off" id="conn-dot"></span><span id="conn-label">sin backend</span></div>
    </div>
    <div class="topbar-user">
      <button class="refresh-btn" onclick="refreshStatus()" title="Actualizar">&#8635;</button>
      <div class="avatar" id="top-avatar">--</div>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="scroll-area" id="main-scroll">

    <!-- Status -->
    <div class="status-card disarmed" id="status-card">
      <div class="status-pulse"><div class="status-icon" id="status-icon">&#128275;</div></div>
      <div class="status-label" id="status-label">Desarmada</div>
      <div class="status-detail" id="status-detail">Sistema en reposo</div>
      <div class="status-time mono" id="status-time">—</div>
    </div>

    <!-- User: action panel -->
    <div id="user-action-panel">
      <p class="section-title">Controlar alarma</p>
      <div class="action-card">
        <p class="action-card-title">Ingresa tu PIN</p>
        <p class="action-card-sub">Requerido para armar o desarmar</p>
        <div class="pin-row" id="action-dots"></div>
        <div class="mini-numpad" id="action-numpad"></div>
        <p class="action-err" id="action-err"></p>
        <div class="action-btns">
          <button class="action-btn arm" onclick="doAction('arm_away')">&#128276; Armar<br><span style="font-size:10px;font-weight:400">Total</span></button>
          <button class="action-btn home" onclick="doAction('arm_home')">&#127968; Armar<br><span style="font-size:10px;font-weight:400">En casa</span></button>
          <button class="action-btn disarm" onclick="doAction('disarm')">&#128275; Desarmar</button>
        </div>
      </div>
    </div>

    <!-- Admin: tabs -->
    <div id="admin-panel" style="display:none">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('estado')">Estado</div>
        <div class="tab" onclick="switchTab('usuarios')">Usuarios</div>
        <div class="tab" onclick="switchTab('config')">Config</div>
      </div>

      <!-- Tab Estado -->
      <div class="tab-panel active" id="tab-estado">
        <p class="section-title">Control directo</p>
        <div class="action-btns" style="margin-bottom:12px">
          <button class="action-btn arm" onclick="adminAction('arm_away')">&#128276; Armar Total</button>
          <button class="action-btn home" onclick="adminAction('arm_home')">&#127968; En Casa</button>
          <button class="action-btn disarm" onclick="adminAction('disarm')">&#128275; Desarmar</button>
        </div>
      </div>

      <!-- Tab Usuarios -->
      <div class="tab-panel" id="tab-usuarios">
        <div id="users-list-admin"></div>
        <p class="section-title">Agregar usuario</p>
        <div class="action-card">
          <div class="form-group"><label class="field-label">Nombre</label><input class="field-input" id="new-name" placeholder="Nombre"></div>
          <div class="form-group"><label class="field-label">PIN (4 dígitos)</label><input class="field-input" id="new-pin" type="password" maxlength="4" placeholder="••••"></div>
          <div class="form-group"><label class="field-label">Rol</label>
            <select class="field-select" id="new-role" style="margin-bottom:0">
              <option value="user">Usuario</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button class="btn-secondary" style="margin-top:8px" onclick="addUser()">Agregar</button>
          <p class="err" id="add-err"></p>
        </div>
      </div>

      <!-- Tab Config -->
      <div class="tab-panel" id="tab-config">
        <div class="action-card">
          <p class="action-card-title" style="margin-bottom:12px">Conexión Tuya</p>
          <div class="form-group"><label class="field-label">Client ID</label><input class="field-input" id="cfg-id" placeholder="client_id"></div>
          <div class="form-group"><label class="field-label">Client Secret</label><input class="field-input" id="cfg-secret" type="password" placeholder="••••••••"></div>
          <div class="form-group"><label class="field-label">Región</label>
            <select class="field-select" id="cfg-region" style="margin-bottom:0">
              <option value="eu">Europa (España)</option>
              <option value="us">América</option>
              <option value="cn">China</option>
              <option value="in">India</option>
            </select>
          </div>
          <div class="form-group" style="margin-top:10px"><label class="field-label">Device ID</label><input class="field-input" id="cfg-device" placeholder="ID del dispositivo"></div>
          <div class="form-group"><label class="field-label">URL Backend (opcional)</label><input class="field-input" id="cfg-backend" placeholder="https://tu-backend.railway.app"></div>
          <div class="form-group"><label class="field-label">App Secret (si usas backend)</label><input class="field-input" id="cfg-appsecret" type="password" placeholder="••••••••"></div>
          <button class="btn-secondary" onclick="saveConfig()">Guardar</button>
          <p class="success-msg" id="cfg-ok"></p>
        </div>
        <div class="action-card" style="margin-top:8px">
          <p class="action-card-title" style="margin-bottom:12px">Cambiar PIN admin</p>
          <div class="form-group"><label class="field-label">PIN actual</label><input class="field-input" id="old-pin" type="password" maxlength="4" placeholder="••••"></div>
          <div class="form-group"><label class="field-label">Nuevo PIN</label><input class="field-input" id="new-apin" type="password" maxlength="4" placeholder="••••"></div>
          <button class="btn-secondary" onclick="changePin()">Cambiar PIN</button>
          <p class="err" id="pin-err"></p>
        </div>
        <div class="action-card" style="margin-top:8px">
          <button class="btn-secondary btn-danger" onclick="resetAll()">Restablecer app</button>
        </div>
      </div>
    </div>

    <!-- Log -->
    <p class="section-title">Actividad reciente</p>
    <div id="log-list"></div>

  </div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let S = {
  users: [
    {id:'admin', name:'Admin',    pin:'1234', role:'admin'},
    {id:'u1',    name:'María',    pin:'5678', role:'user'},
    {id:'u2',    name:'Carlos',   pin:'9012', role:'user'},
  ],
  log: [],
  alarmStatus: 'disarmed',
  config: {clientId:'',secret:'',region:'eu',deviceId:'',backendUrl:'',appSecret:''},
  currentUser: null,
};
let loginPin = '', actionPin = '';

const STATUS = {
  disarmed: {label:'Desarmada',   detail:'Sistema en reposo',     icon:'&#128275;', cls:'disarmed', dot:'#34c759'},
  armed:    {label:'Armada',       detail:'Protección total activa',icon:'&#128276;', cls:'armed',    dot:'#ff4444'},
  arm_home: {label:'Armada (Casa)',detail:'Modo en casa activo',   icon:'&#127968;', cls:'home',     dot:'#ff9500'},
};

// ── Persist ────────────────────────────────────────────────────────────────
function load(){
  try{
    const d = JSON.parse(localStorage.getItem('alarm_pwa')||'{}');
    if(d.users) S.users = d.users;
    if(d.log)   S.log   = d.log;
    if(d.alarmStatus) S.alarmStatus = d.alarmStatus;
    if(d.config) S.config = {...S.config,...d.config};
  }catch(e){}
}
function save(){
  try{localStorage.setItem('alarm_pwa',JSON.stringify({users:S.users,log:S.log,alarmStatus:S.alarmStatus,config:S.config}));}catch(e){}
}

// ── Numpad builder ─────────────────────────────────────────────────────────
function buildNumpad(gridId, dotsId, bufKey, onFull){
  const g = document.getElementById(gridId);
  const d = document.getElementById(dotsId);
  g.innerHTML = ''; d.innerHTML = '';
  for(let i=0;i<4;i++){const el=document.createElement('div');el.className='pin-dot';el.id=dotsId+i;d.appendChild(el);}
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(v=>{
    const b=document.createElement('div');b.className='nk'+(v===''?' empty':v==='⌫'?' del':'');
    b.innerHTML = v===''?'':String(v);
    if(v!==''){
      b.onclick=()=>{
        b.classList.add('pressed');setTimeout(()=>b.classList.remove('pressed'),120);
        if(v==='⌫'){if(bufKey==='loginPin')loginPin=loginPin.slice(0,-1);else actionPin=actionPin.slice(0,-1);}
        else{const cur=bufKey==='loginPin'?loginPin:actionPin;if(cur.length<4){if(bufKey==='loginPin')loginPin+=String(v);else actionPin+=String(v);}}
        syncDots(dotsId,bufKey);
        const len=(bufKey==='loginPin'?loginPin:actionPin).length;
        if(len===4&&onFull)onFull();
      };
    }
    g.appendChild(b);
  });
}
function syncDots(dotsId,bufKey){
  const len=(bufKey==='loginPin'?loginPin:actionPin).length;
  for(let i=0;i<4;i++){const d=document.getElementById(dotsId+i);if(d){d.className='pin-dot'+(i<len?' on':'');}}
}

// ── Login ──────────────────────────────────────────────────────────────────
function buildLoginSelect(){
  const sel = document.getElementById('login-user-sel');
  sel.innerHTML='<option value="">— Seleccionar —</option>';
  S.users.forEach(u=>{
    const o=document.createElement('option');o.value=u.id;
    o.textContent=u.name+(u.role==='admin'?' ★':'');
    sel.appendChild(o);
  });
}
function doLogin(){
  const uid = document.getElementById('login-user-sel').value;
  const err = document.getElementById('login-err');
  if(!uid){err.textContent='Selecciona un usuario';return;}
  const user = S.users.find(u=>u.id===uid);
  if(!user){err.textContent='Usuario no encontrado';return;}
  if(loginPin.length<4){err.textContent='Ingresa tu PIN de 4 dígitos';return;}
  if(loginPin!==user.pin){err.textContent='PIN incorrecto';loginPin='';syncDots('login-dots','loginPin');return;}
  err.textContent=''; loginPin='';
  S.currentUser=user;
  showApp();
}
function doLogout(){S.currentUser=null;loginPin='';showLogin();}

// ── Screens ────────────────────────────────────────────────────────────────
function showLogin(){
  document.getElementById('s-login').className='screen active';
  document.getElementById('s-app').className='screen';
  buildLoginSelect();
  buildNumpad('login-numpad','login-dots','loginPin',null);
  loginPin='';
}
function showApp(){
  document.getElementById('s-login').className='screen';
  document.getElementById('s-app').className='screen active';
  const u=S.currentUser;
  document.getElementById('top-avatar').textContent=u.name.slice(0,2).toUpperCase();
  document.getElementById('app-title').textContent='Alarma — '+u.name;
  document.getElementById('user-action-panel').style.display = u.role==='admin'?'none':'block';
  document.getElementById('admin-panel').style.display = u.role==='admin'?'block':'none';
  if(u.role!=='admin'){
    actionPin='';
    buildNumpad('action-numpad','action-dots','actionPin',null);
  }
  if(u.role==='admin') renderUsersAdmin();
  updateStatusUI();
  renderLog();
  updateConnBadge();
  refreshStatus();
}

// ── Status UI ──────────────────────────────────────────────────────────────
function updateStatusUI(){
  const cfg = STATUS[S.alarmStatus]||STATUS.disarmed;
  const card=document.getElementById('status-card');
  card.className='status-card '+cfg.cls;
  document.getElementById('status-icon').innerHTML=cfg.icon;
  document.getElementById('status-label').textContent=cfg.label;
  document.getElementById('status-detail').textContent=cfg.detail;
  if(S.log.length>0){
    const l=S.log[0];
    document.getElementById('status-time').textContent=l.action+' · '+l.user+' · '+l.time;
  }
}

// ── Actions ────────────────────────────────────────────────────────────────
function doAction(action){
  const err=document.getElementById('action-err');
  if(actionPin.length<4){err.textContent='Ingresa tu PIN (4 dígitos)';return;}
  if(actionPin!==S.currentUser.pin){
    err.textContent='PIN incorrecto';
    actionPin=''; buildNumpad('action-numpad','action-dots','actionPin',null);
    return;
  }
  err.textContent='';
  applyAction(action, S.currentUser.name);
  actionPin=''; buildNumpad('action-numpad','action-dots','actionPin',null);
  sendToBackend(action);
}
function adminAction(action){
  applyAction(action,'Admin');
  sendToBackend(action);
}
function applyAction(action, userName){
  const names={arm_away:'Armado total',arm_home:'Armado en casa',disarm:'Desarmado'};
  S.alarmStatus = action==='disarm'?'disarmed':action==='arm_away'?'armed':'arm_home';
  const now=new Date();
  const time=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+' '+now.getDate()+'/'+(now.getMonth()+1);
  S.log.unshift({action:names[action]||action,user:userName,time,status:S.alarmStatus});
  if(S.log.length>30)S.log.pop();
  save();
  updateStatusUI();
  renderLog();
  toast(names[action]);
}

// ── Backend / Tuya API ─────────────────────────────────────────────────────
async function sendToBackend(action){
  const {backendUrl, appSecret, clientId, secret: clientSecret, region, deviceId} = S.config;
  if(backendUrl){
    try{
      await fetch(backendUrl+'/alarm/command',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-app-secret':appSecret},
        body:JSON.stringify({action,deviceId})
      });
      setConnected(true);
    }catch(e){setConnected(false);}
  }
}
async function refreshStatus(){
  const {backendUrl,appSecret,deviceId}=S.config;
  if(!backendUrl)return;
  setConnBusy();
  try{
    const r=await fetch(backendUrl+'/alarm/status?deviceId='+deviceId,{headers:{'x-app-secret':appSecret}});
    const d=await r.json();
    setConnected(true);
    if(d.ok&&d.status){
      const map={'arm':'armed','home':'arm_home','disarmed':'disarmed'};
      if(map[d.status])S.alarmStatus=map[d.status];
      updateStatusUI();
    }
  }catch(e){setConnected(false);}
}
function setConnected(ok){
  const dot=document.getElementById('conn-dot');
  const lbl=document.getElementById('conn-label');
  dot.className='conn-dot'+(ok?'':' off');
  lbl.textContent=ok?'conectado':'sin conexión';
}
function setConnBusy(){
  const dot=document.getElementById('conn-dot');
  dot.className='conn-dot busy';
  document.getElementById('conn-label').textContent='actualizando…';
}
function updateConnBadge(){
  const has=!!S.config.backendUrl;
  setConnected(false);
  if(!has)document.getElementById('conn-label').textContent='sin backend';
}

// ── Log ────────────────────────────────────────────────────────────────────
function renderLog(){
  const el=document.getElementById('log-list');
  const items=S.currentUser?.role==='admin'?S.log:S.log.filter(l=>l.user===S.currentUser?.name||l.user==='Admin');
  if(!items.length){el.innerHTML='<p style="font-size:13px;color:var(--muted);padding:10px 0">Sin actividad registrada</p>';return;}
  const dotColor={disarmed:'#34c759',armed:'#ff4444',arm_home:'#ff9500'};
  el.innerHTML=items.slice(0,12).map(l=>`
    <div class="log-item">
      <div class="log-dot" style="background:${dotColor[l.status]||'#6b6b80'}"></div>
      <div class="log-info">
        <div class="log-action">${l.action}</div>
        <div class="log-meta">${l.user}</div>
      </div>
      <div class="log-time">${l.time}</div>
    </div>`).join('');
}

// ── Admin: users ───────────────────────────────────────────────────────────
function renderUsersAdmin(){
  const el=document.getElementById('users-list-admin');
  el.innerHTML='<p class="section-title">Usuarios</p>'+S.users.map(u=>`
    <div class="user-row">
      <div class="user-av">${u.name.slice(0,2).toUpperCase()}</div>
      <div><div class="user-name">${u.name}</div><div class="user-role">${u.role==='admin'?'Admin':'Usuario'} · PIN: ${'•'.repeat(u.pin.length)}</div></div>
      ${u.id!=='admin'?`<button class="del-btn" onclick="removeUser('${u.id}')">Eliminar</button>`:''}
    </div>`).join('');
}
function addUser(){
  const name=document.getElementById('new-name').value.trim();
  const pin=document.getElementById('new-pin').value.trim();
  const role=document.getElementById('new-role').value;
  const err=document.getElementById('add-err');
  if(!name){err.textContent='Escribe el nombre';return;}
  if(!/^\d{4}$/.test(pin)){err.textContent='PIN: exactamente 4 dígitos';return;}
  S.users.push({id:'u'+Date.now(),name,pin,role});
  save(); renderUsersAdmin();
  document.getElementById('new-name').value='';
  document.getElementById('new-pin').value='';
  err.textContent=''; toast('Usuario agregado');
}
function removeUser(id){
  if(!confirm('¿Eliminar este usuario?'))return;
  S.users=S.users.filter(u=>u.id!==id);
  save(); renderUsersAdmin(); toast('Usuario eliminado');
}

// ── Config ─────────────────────────────────────────────────────────────────
function loadConfigForm(){
  document.getElementById('cfg-id').value=S.config.clientId||'';
  document.getElementById('cfg-secret').value=S.config.secret||'';
  document.getElementById('cfg-region').value=S.config.region||'eu';
  document.getElementById('cfg-device').value=S.config.deviceId||'';
  document.getElementById('cfg-backend').value=S.config.backendUrl||'';
  document.getElementById('cfg-appsecret').value=S.config.appSecret||'';
}
function saveConfig(){
  S.config.clientId=document.getElementById('cfg-id').value.trim();
  S.config.secret=document.getElementById('cfg-secret').value.trim();
  S.config.region=document.getElementById('cfg-region').value;
  S.config.deviceId=document.getElementById('cfg-device').value.trim();
  S.config.backendUrl=document.getElementById('cfg-backend').value.trim().replace(/\/$/,'');
  S.config.appSecret=document.getElementById('cfg-appsecret').value.trim();
  save(); updateConnBadge();
  const ok=document.getElementById('cfg-ok');
  ok.textContent='Configuración guardada ✓';
  setTimeout(()=>ok.textContent='',2500);
}
function changePin(){
  const old=document.getElementById('old-pin').value;
  const nw=document.getElementById('new-apin').value;
  const err=document.getElementById('pin-err');
  const admin=S.users.find(u=>u.id==='admin');
  if(old!==admin.pin){err.textContent='PIN actual incorrecto';return;}
  if(!/^\d{4}$/.test(nw)){err.textContent='El nuevo PIN debe ser 4 dígitos';return;}
  admin.pin=nw; save();
  err.textContent=''; document.getElementById('old-pin').value=''; document.getElementById('new-apin').value='';
  toast('PIN actualizado');
}
function resetAll(){
  if(!confirm('¿Borrar todos los datos?'))return;
  try{localStorage.removeItem('alarm_pwa');}catch(e){}
  location.reload();
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.className='tab'+((['estado','usuarios','config'][i])===name?' active':''));
  document.querySelectorAll('.tab-panel').forEach(p=>p.className='tab-panel');
  document.getElementById('tab-'+name).className='tab-panel active';
  if(name==='usuarios')renderUsersAdmin();
  if(name==='config')loadConfigForm();
}

// ── Toast ──────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

// ── Init ───────────────────────────────────────────────────────────────────
load();
showLogin();

// Service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
